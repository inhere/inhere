name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin inhere-markview
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=inhere&repo=markview&show_owner=true
          path: profile/pin-inhere-markview.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin gookit-color
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=gookit&repo=color&show_owner=true
          path: profile/pin-gookit-color.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin gookit-config
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=gookit&repo=config&show_owner=true
          path: profile/pin-gookit-config.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin gookit-goutil
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=gookit&repo=goutil&show_owner=true
          path: profile/pin-gookit-goutil.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin gookit-gcli
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=gookit&repo=gcli&show_owner=true
          path: profile/pin-gookit-gcli.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin gookit-slog
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=gookit&repo=slog&show_owner=true
          path: profile/pin-gookit-slog.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin gookit-validate
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=gookit&repo=validate&show_owner=true
          path: profile/pin-gookit-validate.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
